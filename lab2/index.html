<!DOCTYPE html>
<html>

<head>
    <title> Guess a Number </title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <header>
        <h1>Guess the Number!</h1>
        <h2>Guess a number between 1 and 99 in seven attempts!</h2>
    </header>
    <br>
    <div id="main">
        Enter a guess:
        <input type="text" id="playerGuess" size="9">
        <!-- size = length of input box -->
        <button id="guessBtn"> Guess </button>
        <button id="resetBtn"> Reset </button>
        <div id="feedback"></div>
    </div>
    <div> Previous Guesses:
        <span id="guesses"></span>
    </div>
    <div> Attempts left:
        <span id="remaining_attempts"></span>
    </div>
    <div id="score"></div>

    <footer><small>2026 &copy; Wang</small></footer>
    <script src="js/script.js"></script>  
</body>

</html>
