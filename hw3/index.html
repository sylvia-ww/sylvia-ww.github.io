<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <div class="wrapper search-wrapper">
        <div class="search">
            <input id="search-bar" type="text" placeholder="Enter a city">
            <button><img id="search-icon" src="./img/search-icon.png" alt="search icon"></button>
        </div>
        <div id="search-error"></div>
    </div>
    <div class="wrapper vertical text-fade min">
        <div class="blue">min</div>
        <div><img src="./img/temp-low.png" alt="lowest temperature"></div>
        <div class="temp-detail" id="temp-min">0°F</div>
    </div>
    <div class="wrapper display">
        <img class="bigger-img" src="./img/temp-now.png" alt="temperature now">
        <div id="temperature">25</div>
        <div id="degree-f">°F</div>
        <div id="description">
            <span id="w-main">drizzle</span>
            <img id="weather-icon" src="https://openweathermap.org/payload/api/media/file/09d.png" alt="weather icon">
            <span id="w-desc">heavy intensity shower rain</span>
        </div>
        <div class="blue" id="advice">bring an umbrella~</div>
    </div>
    <div class="max">
        <div class="wrapper vertical text-fade max">
            <div id="temp-max">25°F</div>
            <div><img src="./img/temp-high.png" alt="highest temperature"></div>
            <div class="blue">max</div>
        </div>
        <div class="toggle wrapper">

        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
