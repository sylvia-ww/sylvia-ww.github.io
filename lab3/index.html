<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title> Sign Up Page </title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <h1> Sign Up Form</h1>
<hr>
    <form id="signupForm" action="welcome.html">
        <label> First Name:
            <input type="text" id="fName" name="fName"><br>
        </label>
<br>
        <label>Last Name:
            <input type="text" id="lName" name="lName"><br>
        </label>
<br>
        <!-- name must be the same to be grouped -->
            <span class="indent">Gender:</span>
        <label><input type="radio" name="gender" value="m"> Male</label>
        <label><input type="radio" name="gender" value="f"> Female</label><br>
<hr>
        <label>Zip Code:
            <input type="text" id="zip" name="zip"><br>
        </label>
<br>
        <span class="indent1">City:</span> <span id="city"></span><br>
        <span class="indent1">Latitude:</span> <span id="latitude"></span><br>
        <span class="indent1">Longitude:</span> <span id="longitude"></span><br>

        <!-- dropdown to be populated w/api -->
        <label>State:
            <select id="state" name="state">
                <option value="">Loading states...</option>
            </select><br>
        </label>
<br>
        <label>Select a County:
            <select id="county" name="county">
                <option value="">Please select a state</option>
            </select><br>
        </label>
<br>
<hr>
        <label>Desired Username:
            <input type="text" id="username" name="username">
        </label>
        <span id="usernameError"></span><br>

        <label>Password:
            <input type="password" id="password" name="password"><br>
        </label>
        <span id="spw-label"></span>
        <span id="suggestedPassword"></span>
<br>
        <label>Type Password Again:
            <input type="password" id="passwordAgain" name="passwordAgain"><br>
        </label>
        <br>
        <span class="indent" id="passwordError"></span><br>

        <button type="submit" class="btn btn-primary">Sign up!</button>
    </form>
    <script src="js/script.js"></script>
</body>

</html>
